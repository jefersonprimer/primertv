services:
  postgres:
    image: postgres:17
    container_name: primertv-postgres
    restart: always

    environment:
      POSTGRES_USER: primer
      POSTGRES_PASSWORD: primer123
      POSTGRES_DB: primertv

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
